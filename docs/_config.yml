remote_theme: pmarsceill/just-the-docs

title: ""
logo: "/assets/IDEAtlas_transp.png"
logo_width: 300
description: "Technical workshop on mapping Deprived Urban Areas using Earth Observation and AI"

# Exclude from search and build
exclude:
  - assets/tmp
  - docs/tmp
  - node_modules

# Just-the-docs theme settings
color_scheme: light
search_enabled: false
heading_anchors: true

# Custom CSS for logo sizing
custom_head: |
  <style>
    .site-logo img {
      width: 300px !important;
      height: auto !important;
    }
  </style>

# Defaults for pages
defaults:
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: "default"